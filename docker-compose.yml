version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vidra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidra_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-vidra}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidra}"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://vidra.hellolexa.space}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vidra}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vidra_secure_password}
      DB_NAME: ${POSTGRES_DB:-vidra}
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 40s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://vidra.hellolexa.space}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.vidra.hellolexa.space}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 8s
      retries: 5

volumes:
  postgres_data:
