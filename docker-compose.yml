version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vidra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidra_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-vidra}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidra}"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      APP_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://vidra.life}
      AUTO_CREATE_TABLES: ${AUTO_CREATE_TABLES:-true}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      APP_POLICY_VERSION: ${APP_POLICY_VERSION:-1.0}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
      POSTHOG_PROJECT_KEY: ${POSTHOG_PROJECT_KEY:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-vidra}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-vidra_secure_password}
      DB_NAME: ${POSTGRES_DB:-vidra}
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_MAX: ${STRIPE_PRICE_MAX:-}
      STRIPE_PRICE_TOPUP_STARTER: ${STRIPE_PRICE_TOPUP_STARTER:-}
      STRIPE_PRICE_TOPUP_GROWTH: ${STRIPE_PRICE_TOPUP_GROWTH:-}
      STRIPE_PRICE_TOPUP_SCALE: ${STRIPE_PRICE_TOPUP_SCALE:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-anthropic/claude-sonnet-4-20250514}
      FAL_API_KEY: ${FAL_API_KEY:-}
      FAL_IMAGE_MODEL: ${FAL_IMAGE_MODEL:-fal-ai/flux/schnell}
      FAL_EDIT_MODEL: ${FAL_EDIT_MODEL:-fal-ai/flux-lora/image-edit}
      FAL_IMAGE_COST_CREDITS: ${FAL_IMAGE_COST_CREDITS:-20}
      FAL_EDIT_COST_CREDITS: ${FAL_EDIT_COST_CREDITS:-12}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 15s
      retries: 20
      start_period: 60s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://vidra.life}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      API_URL: http://api:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.vidra.life}
      NEXT_PUBLIC_APP_POLICY_VERSION: ${NEXT_PUBLIC_APP_POLICY_VERSION:-1.0}
      NEXT_PUBLIC_LEGAL_OWNER: ${NEXT_PUBLIC_LEGAL_OWNER:-}
      NEXT_PUBLIC_LEGAL_CONTACT_EMAIL: ${NEXT_PUBLIC_LEGAL_CONTACT_EMAIL:-}
      NEXT_PUBLIC_LEGAL_COUNTRY: ${NEXT_PUBLIC_LEGAL_COUNTRY:-Italy}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 8s
      retries: 5

volumes:
  postgres_data:
